# Lefthook configuration
# https://github.com/evilmartians/lefthook
#
# Setup: lefthook install
# Bypass: git commit --no-verify (or LEFTHOOK=0 git commit)

pre-commit:
  parallel: false
  commands:
    fmt:
      run: just fmt-fix
      stage_fixed: true
    test:
      run: just test

# Mutation testing runs on a weekly schedule
# (.github/workflows/mutation.yml) rather than gating every push.
# Invoke manually with `just mutation-test` when needed.
