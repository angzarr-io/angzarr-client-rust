name: Docs

# Builds rustdoc on every push to main and publishes it to GitHub Pages.
# Once the crate is published to crates.io, docs.rs will host the canonical
# reference at https://docs.rs/angzarr-client and this workflow can be
# repurposed or retired. Until then, GitHub Pages is the bridge so the
# angzarr-project site has something to link to.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages deploys use these permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# Only run one Pages deploy at a time; skip intermediate ones.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install buf CLI
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Install protoc plugins
        run: cargo install protoc-gen-prost protoc-gen-tonic

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}

      - name: Build rustdoc
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      # Pages needs an index.html at the root; rustdoc puts it one level down.
      - name: Add root redirect to the crate's doc index
        run: |
          echo '<meta http-equiv="refresh" content="0; url=angzarr_client/index.html">' > target/doc/index.html

      # Configure the custom domain. GitHub Pages reads this file on deploy
      # and serves the site at the domain specified; the DNS CNAME
      # `rust.angzarr.io → angzarr-io.github.io` handles routing.
      - name: Write CNAME
        run: echo "rust.angzarr.io" > target/doc/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
