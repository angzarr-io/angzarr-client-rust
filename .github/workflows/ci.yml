name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  RUST_IMAGE: ghcr.io/angzarr-io/angzarr-rust:latest

permissions:
  contents: read
  packages: read

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Export protos from Buf registry
        run: |
          # Install buf CLI
          curl -sSL https://github.com/bufbuild/buf/releases/latest/download/buf-Linux-x86_64 -o buf
          chmod +x buf
          sudo mv buf /usr/local/bin/

          # Export protos to local directory
          mkdir -p proto
          buf export buf.build/angzarr/angzarr -o proto

      - name: Build
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e ANGZARR_PROTO_ROOT=/workspace/proto \
            ${{ env.RUST_IMAGE }} \
            cargo build --release

      - name: Test
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e ANGZARR_PROTO_ROOT=/workspace/proto \
            ${{ env.RUST_IMAGE }} \
            cargo test --lib

      - name: Clippy
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e ANGZARR_PROTO_ROOT=/workspace/proto \
            ${{ env.RUST_IMAGE }} \
            cargo clippy --all-targets -- -D warnings

      - name: Format check
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ env.RUST_IMAGE }} \
            cargo fmt --check
