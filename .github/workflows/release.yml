name: Release

# Fires on a v*.*.* tag push. For ad-hoc / recovery runs, use the manual
# workflow_dispatch trigger — it takes the current state of main.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Verify version
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Releasing $TAG_VERSION"

      - name: Verify VERSION file matches tag
        run: |
          FILE_VERSION=$(cat VERSION)
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    needs: [validate]
    # workflow_dispatch bypasses validate; still build+test.
    if: always() && (needs.validate.result == 'success' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install buf CLI
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Install protoc plugins
        run: cargo install protoc-gen-prost protoc-gen-tonic

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: just -f justfile.container build

      - name: Test
        run: just -f justfile.container test

  # Publishing to crates.io is gated off until CARGO_REGISTRY_TOKEN is
  # configured and the team is ready to cut a public release. Uncomment
  # the `publish` job below and change `github-release.needs` back to
  # `[publish]` to re-enable.
