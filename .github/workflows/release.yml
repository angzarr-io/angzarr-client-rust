  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    # While publish is gated off, chain github-release directly off build-test.
    # When crates.io publishing is re-enabled, change this back to [publish].
    needs: [build-test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
