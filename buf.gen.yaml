version: v2
inputs:
  # Use local proto from core during development
  # For release: module: buf.build/angzarr/angzarr:VERSION
  - directory: /home/babbitt/workspace/angzarr/core/main/proto
plugins:
  - local: protoc-gen-prost
    out: src/proto/gen
    opt:
      - enable_type_names
  - local: protoc-gen-tonic
    out: src/proto/gen
